<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script src="./lx.js"></script>
		<title>LX demo page</title>
		<style>
			div {
				background-color: rgba(255, 180, 0, 0.08);
				border: 1px dashed rgba(0, 0, 0, 0.25);
				display: grid;
				place-items: center;
				font-size: 4rem;
				font-family: sans-serif;
				box-sizing: border-box;
				overflow: hidden;
			}
		</style>
	</head>
	<body>
		<div id="screen" lx-left="body.left+0" lx-top="body.top+0" lx-width="1920" lx-height="1080">
			<div id="main" lx-left="#screen.left+50" lx-top="#screen.top+50" lx-width="1344" lx-height="756">main</div>

			<div
				id="sidebar"
				lx-left="#main.right+20"
				lx-right="#screen.right-50"
				lx-top="#screen.top+50"
				lx-height="756"
			>
				<div
					id="info"
					lx-left="#sidebar.left+0"
					lx-right="#sidebar.right+0"
					lx-top="#sidebar.top+0"
					lx-height="200/500"
				>
					info
				</div>

				<div
					id="qa"
					lx-left="#sidebar.left+0"
					lx-right="#sidebar.right+0"
					lx-top="#info.bottom+20"
					lx-height="100"
				>
					qa
				</div>

				<div
					id="logo"
					lx-left="#sidebar.left+0"
					lx-right="#sidebar.right+0"
					lx-top="#qa.bottom+20"
					lx-bottom="#sidebar.bottom+0"
				>
					logo
				</div>
			</div>

			<div
				id="ad"
				lx-left="#screen.left+50"
				lx-right="#screen.right-50"
				lx-top="#main.bottom+20"
				lx-bottom="#screen.bottom-50"
			>
				AD
			</div>
		</div>
	</body>
</html>
