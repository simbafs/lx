<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script src="./lx.js"></script>
		<title>LX demo page</title>
		<style>
			div {
				background-color: rgba(255, 180, 0, 0.08);
				border: 1px dashed rgba(0, 0, 0, 0.25);
				display: grid;
				place-items: center;
				font-size: 4rem;
				font-family: sans-serif;
				box-sizing: border-box;
				overflow: hidden;
			}
		</style>
	</head>
	<body>
		<div id="screen" lx lx-l="0" lx-t="0" lx-w="1920" lx-h="1080">
			<div id="main" lx-l="50" lx-t="50" lx-w="1344" lx-h="756">main</div>

			<div id="sidebar" lx lx-left="#main.right+20" lx-right="#screen.right-50" lx-t="50" lx-h="756">
				<div id="info" lx-left="#sidebar.left+0" lx-r="0" lx-t="0" lx-h="200/500">info</div>

				<div id="qa" lx-l="0" lx-r="0" lx-t="#info.bottom+20" lx-h="100">qa</div>

				<div id="logo" lx-l="0" lx-r="0" lx-t="#qa.bottom+20" lx-b="0">logo</div>
			</div>

			<div id="ad" lx-l="50" lx-r="-50" lx-t="#main.bottom+20" lx-b="-50">AD</div>
		</div>

		<script>
			const info = document.getElementById('info')

			info.addEventListener('click', () => {
				info.innerText += ' info'
				lx.init()
			})

			info.addEventListener('dblclick', () => {
				info.innerText = 'info'
				lx.init()
			})
		</script>
	</body>
</html>
