<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script src="./lx.js"></script>
		<script src="./lx-auto.js"></script>
		<title>LX demo page</title>
		<style>
			#controls {
				position: fixed;
				top: 10px;
				right: 10px;
				background: #fff;
				border: 1px solid #ccc;
				border-radius: 8px;
				padding: 16px;
				z-index: 9999;
				font-family: sans-serif;
				font-size: 14px;
				display: flex;
				flex-direction: column;
				gap: 12px;
				box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
			}
			#controls label {
				display: flex;
				flex-direction: column;
				gap: 4px;
			}
			#controls span {
				display: flex;
				justify-content: space-between;
			}
			#controls input[type="range"] {
				width: 150px;
			}
			div:not(#controls) {
				background-color: rgba(255, 180, 0, 0.08);
				border: 1px dashed rgba(0, 0, 0, 0.25);
				display: grid;
				place-items: center;
				font-size: 4rem;
				font-family: sans-serif;
				box-sizing: border-box;
				overflow: hidden;
			}
		</style>
	</head>
	<body data-lx-gap="25" data-lx-scale="0.8">
		<div id="controls">
			<label>
				<span>gap: <output id="gap-val">25</output></span>
				<input type="range" id="gap-slider" min="5" max="100" value="25" />
			</label>
			<label>
				<span>scale: <output id="scale-val">0.8</output></span>
				<input type="range" id="scale-slider" min="0.1" max="1.0" step="0.05" value="0.8" />
			</label>
		</div>

		<div id="screen" lx lx-l="0" lx-t="0" lx-w="1920" lx-h="1080">
			<div id="main" lx-l="50" lx-t="50" lx-w="(1920*{scale})" lx-h="(1080*{scale})">main</div>

			<div id="sidebar" lx lx-l="#main.right+({gap})" lx-r="#screen.right-50" lx-t="50" lx-h="(1080*{scale})">
				<div id="info" lx-l="#sidebar.left+0" lx-r="0" lx-t="0" lx-h="200/500">info</div>

				<div id="qa" lx lx-l="0" lx-r="0" lx-t="#info.bottom+({gap})" lx-h="100">qa</div>

				<div id="logo" lx lx-l="0" lx-r="0" lx-t="#qa.bottom+({gap})" lx-b="0">logo</div>
			</div>

			<div id="ad" lx-l="50" lx-r="-50" lx-t="#main.bottom+({gap})" lx-b="-50">AD</div>
		</div>

		<script>
			const info = document.getElementById('info')
			const gapSlider = document.getElementById('gap-slider')
			const gapVal = document.getElementById('gap-val')
			const scaleSlider = document.getElementById('scale-slider')
			const scaleVal = document.getElementById('scale-val')

			gapSlider.addEventListener('input', (e) => {
				const v = e.target.value
				document.body.dataset.lxGap = v
				gapVal.textContent = v
			})

			scaleSlider.addEventListener('input', (e) => {
				const v = e.target.value
				document.body.dataset.lxScale = v
				scaleVal.textContent = v
			})

			info.addEventListener('click', () => {
				info.innerText += ' info'
			})

			info.addEventListener('dblclick', () => {
				info.innerText = 'info'
			})
		</script>
	</body>
</html>
