<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script src="./lx.js"></script>
		<title>LX demo page</title>
		<style>
			div {
				background-color: rgba(255, 180, 0, 0.08);
				border: 1px dashed rgba(0, 0, 0, 0.25);
				display: grid;
				place-items: center;
			}
		</style>
	</head>
	<body>
		<div id="screen" lx lx-t="50" lx-l="50" lx-w="1920" lx-h="1080">
			<div id="main" lx-t="50" lx-h="756" lx-l="50" lx-w="1344">main</div>
			<div id="sidebar" lx lx-t="50" lx-h="756" lx-l="#main.right+20" lx-r="-50">
				<div id="info" lx-t="0" lx-h="300" lx-r="0" lx-l="0">info</div>
				<div id="logo" lx-t="#info.bottom+20" lx-b="0" lx-l="0" lx-r="0">logo</div>
			</div>
		</div>
	</body>
</html>
