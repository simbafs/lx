<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script src="./lx.js"></script>
		<title>LX demo page</title>
		<style>
			div {
				background-color: rgba(255, 180, 0, 0.08);
				border: 1px dashed rgba(0, 0, 0, 0.25);
			}
		</style>
	</head>
	<body>
		<div id="screen" lx lx-top="50" lx-left="50" lx-width="1920" lx-height="1080">
			<div id="logo" lx-left="50" lx-top="50" lx-width="100" lx-height="100">logo</div>
			<div id="info" lx-left="50" lx-top="#logo.bottom+10" lx-width="200" lx-height="100">info card</div>

			<div id="nested" lx lx-left="50" lx-top="#info.bottom+10" lx-width="300" lx-height="300">
				<div id="nested-logo" lx-left="50" lx-top="50" lx-width="100" lx-height="100">nested logo</div>
				<div id="nested-info" lx-left="50" lx-top="#nested-logo.bottom+10" lx-width="200" lx-height="100">
					nested info card
				</div>

				<div id="nested-nested" lx lx-left="50" lx-top="#nested-info.bottom+10" lx-width="300" lx-height="300">
					<div id="nested-nested-logo" lx-left="50" lx-top="50" lx-width="100" lx-height="100">
						nested logo
					</div>
					<div
						id="nested-nested-info"
						lx-left="50"
						lx-top="#nested-nested-logo.bottom+10"
						lx-width="200"
						lx-height="100"
					>
						nested info card
					</div>
				</div>
			</div>

			<div id="ad" lx-bottom="-50" lx-left="50" lx-right="-50" lx-height="100">ad banner</div>
		</div>
	</body>
</html>
