name: CI and Publish

on:
    push:
        branches: [main]
        tags: ['v*']

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v3
              with:
                  version: 10

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '25'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Playwright Browsers
              run: pnpm --filter @simbafs/lx exec playwright install --with-deps

            - name: Run tests
              run: pnpm --filter @simbafs/lx test

    publish:
        runs-on: ubuntu-latest
        needs: test
        if: startsWith(github.ref, 'refs/tags/v')
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v3
              with:
                  version: 10

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '25'
                  registry-url: 'https://registry.npmjs.org'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm -r build

            - name: Publish to NPM
              # 注意：working-directory 對於單一發布是正確的
              working-directory: packages/core
              run: pnpm publish --access public --no-git-checks --provenance
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    deploy-docs:
        runs-on: ubuntu-latest
        # 建議加上 needs: test 確保測試過才更新文件
        needs: test
        if: github.ref == 'refs/heads/main'
        steps:
            - uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v3
              with:
                  version: 10

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '25'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build Docs
              # 請確認你的 docs/package.json 裡的 name 是否為 lx-docs
              run: pnpm --filter lx-docs build

            - name: Deploy to GitHub Pages
              uses: peaceiris/actions-gh-pages@v3
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  # 確保路徑指向 docs 目錄下的 dist
                  publish_dir: ./docs/dist
