name: CI and Publish

on:
    push:
        branches: [main]
        tags: ['v*']

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v3
              with:
                  version: 10 # 指定你使用的 pnpm 版本

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '25'
                  cache: 'pnpm' # 自動快取 pnpm 依賴，加速執行

            - name: Install dependencies
              run: pnpm install --frozen-lockfile # 確保依賴與 lockfile 完全一致

            - name: Install Playwright Browsers
              run: pnpm exec playwright install --with-deps

            - name: Run tests
              run: pnpm test

    publish:
        runs-on: ubuntu-latest
        needs: test
        # 只有在推送到 tag (v0.x.x) 時才執行發佈
        if: startsWith(github.ref, 'refs/tags/v')
        permissions:
          contents: read
          id-token: write # 必填！為了讓 npm 驗證 GitHub 身份
        steps:
            - uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v3
              with:
                  version: 10

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '25'
                  registry-url: 'https://registry.npmjs.org'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build project
              run: pnpm run build

            - name: Publish to NPM
              # pnpm publish 會自動檢查是否有撰寫 access
              run: pnpm publish --access public --no-git-checks --provenance
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
