<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LX Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: auto;
    }
    body {
      font-family: sans-serif;
      background: #f5f5f5;
    }
    :is([lx], [lx-left], [lx-right], [lx-top], [lx-bottom], [lx-width], [lx-height], [lx-aspect], [lx-l], [lx-r], [lx-t], [lx-b], [lx-w], [lx-h], [lx-a]) {
      background-color: rgba(255, 180, 0, 0.08);
      border: 1px dashed rgba(0, 0, 0, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: #666;
      box-sizing: border-box;
    }
    :is([lx], [lx-left], [lx-right], [lx-top], [lx-bottom], [lx-width], [lx-height], [lx-aspect], [lx-l], [lx-r], [lx-t], [lx-b], [lx-w], [lx-h], [lx-a]):hover {
      background-color: rgba(255, 180, 0, 0.15);
    }
    :is([lx], [lx-left], [lx-right], [lx-top], [lx-bottom], [lx-width], [lx-height], [lx-aspect], [lx-l], [lx-r], [lx-t], [lx-b], [lx-w], [lx-h], [lx-a]).selected {
      border: 2px solid #007acc;
      background-color: rgba(0, 122, 204, 0.2);
    }
    [lx-aspect-disabled] {
      opacity: 0.6;
    }
    [lx-aspect-disabled]::after {
      content: '🔒';
      position: absolute;
      top: 4px;
      right: 4px;
      font-size: 12px;
    }
    .handle {
      position: absolute;
      background: transparent;
      z-index: 10;
      pointer-events: auto;
    }
    .handle.handle-top {
      top: 0; left: 0; right: 0; height: 10px;
      cursor: ns-resize;
    }
    .handle.handle-bottom {
      bottom: 0; left: 0; right: 0; height: 10px;
      cursor: ns-resize;
    }
    .handle.handle-left {
      top: 0; bottom: 0; left: 0; width: 10px;
      cursor: ew-resize;
    }
    .handle.handle-right {
      top: 0; bottom: 0; right: 0; width: 10px;
      cursor: ew-resize;
    }
    .handle:hover {
      background: rgba(0, 122, 204, 0.3);
    }
    .handle.active {
      background: rgba(0, 122, 204, 0.5) !important;
    }
    .handle.overlapping {
      background: rgba(0, 122, 204, 0.15);
    }
    .handle.dragging {
      background: rgba(0, 122, 204, 0.5) !important;
      pointer-events: auto;
    }
    .handle.dragging:hover {
      background: rgba(0, 122, 204, 0.5) !important;
    }
    body.is-dragging .handle:not(.dragging) {
      pointer-events: none;
    }
    body.is-dragging .handle:not(.dragging):hover {
      background: transparent;
    }
    .handle.disabled {
      cursor: not-allowed;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="lx-preview-root"></div>

  <script src="/lx.min.js"></script>
  <script>
    const { setup, update } = window.lx;

    const container = document.getElementById('lx-preview-root');
    let selectedElementId = null;

    window.addEventListener('load', () => {
      parent.postMessage({ type: 'ready' }, '*');
    });

    window.addEventListener('message', async (event) => {
      const { type, html, elementId } = event.data;
      if (type === 'render') {
        render(html);
      } else if (type === 'updateSelection') {
        updateSelection(elementId);
      }
    });

    function updateSelection(elementId) {
      if (selectedElementId) {
        const prev = container.querySelector(`#${selectedElementId}`);
        if (prev) prev.classList.remove('selected');
      }
      selectedElementId = elementId;
      if (elementId) {
        const el = container.querySelector(`#${elementId}`);
        if (el) el.classList.add('selected');
      }
    }

    function render(html) {
      container.innerHTML = html;

      window.lx.setup(container, { debug: false });

      attachEventListeners();
    }

    function attachEventListeners() {
      const elements = container.querySelectorAll('[lx], [lx-left], [lx-right], [lx-top], [lx-bottom], [lx-width], [lx-height], [lx-aspect], [lx-l], [lx-r], [lx-t], [lx-b], [lx-w], [lx-h], [lx-a]');
      
      elements.forEach(el => {
        const hasAspect = el.hasAttribute('lx-aspect') || el.getAttribute('lx-aspect');
        
        if (hasAspect) {
          el.setAttribute('lx-aspect-disabled', '');
        }

        el.addEventListener('click', (e) => {
          e.stopPropagation();
          parent.postMessage({ type: 'elementClick', elementId: el.id }, '*');
        });

        el.addEventListener('dblclick', (e) => {
          e.stopPropagation();
          const rect = el.getBoundingClientRect();
          parent.postMessage({ 
            type: 'openPropertyEditor', 
            elementId: el.id,
            x: rect.left,
            y: rect.top
          }, '*');
        });

        attachHandleDrag(el, hasAspect);
      });
    }

    function attachHandleDrag(el, hasAspect) {
      const handles = [
        { edge: 'top', class: 'handle-top' },
        { edge: 'bottom', class: 'handle-bottom' },
        { edge: 'left', class: 'handle-left' },
        { edge: 'right', class: 'handle-right' },
      ];

      handles.forEach(({ edge, class: className }) => {
        const handle = document.createElement('div');
        handle.className = `handle ${className}${hasAspect ? ' disabled' : ''}`;
        handle.dataset.edge = edge;
        handle.dataset.elementId = el.id;

        handle.addEventListener('mouseenter', () => {
          parent.postMessage({ type: 'handleHover', elementId: el.id, edge }, '*');
        });

        handle.addEventListener('mouseleave', () => {
          parent.postMessage({ type: 'handleHover', elementId: null, edge: null }, '*');
          const allHandles = document.querySelectorAll('.handle');
          allHandles.forEach(h => {
            h.classList.remove('active', 'overlapping');
          });
        });

        handle.addEventListener('wheel', (e) => {
          e.preventDefault();
          e.stopPropagation();

          const mouseX = e.clientX;
          const mouseY = e.clientY;
          const allHandles = document.querySelectorAll('.handle');

          const handleDebug = Array.from(allHandles).map(h => {
            const rect = h.getBoundingClientRect();
            const isOverlapping = mouseX >= rect.left && mouseX <= rect.right &&
                                  mouseY >= rect.top && mouseY <= rect.bottom;
            return {
              id: h.dataset.elementId,
              edge: h.dataset.edge,
              bounds: { left: rect.left, right: rect.right, top: rect.top, bottom: rect.bottom },
              isOverlapping
            };
          });

          console.log('[preview] mouse position:', { x: mouseX, y: mouseY });
          console.log('[preview] handles:', handleDebug);

          const overlappingHandles = handleDebug.filter(h => h.isOverlapping);

          // Clear handle classes when there's only 0 or 1 handle under mouse
          if (overlappingHandles.length <= 1) {
            allHandles.forEach(h => {
              h.classList.remove('active', 'overlapping');
            });
            return;
          }

          const elementIdsAtPoint = overlappingHandles.map(h => h.id).filter(id => id);

          const currentIndex = selectedElementId
            ? elementIdsAtPoint.indexOf(selectedElementId)
            : elementIdsAtPoint.indexOf(el.id);
          
          const validCurrentIndex = currentIndex === -1 ? 0 : currentIndex;
          let newIndex;
          if (e.deltaY < 0) {
            newIndex = (validCurrentIndex + 1) % elementIdsAtPoint.length;
          } else {
            newIndex = (validCurrentIndex - 1 + elementIdsAtPoint.length) % elementIdsAtPoint.length;
          }

          // Mark overlapping handles
          const newSelectedId = elementIdsAtPoint[newIndex];
          allHandles.forEach(h => {
            h.classList.remove('overlapping');
          });
          overlappingHandles.forEach(h => {
            const id = h.id;
            const handle = Array.from(allHandles).find(ah => 
              ah.dataset.elementId === id && ah.dataset.edge === h.edge
            );
            if (handle) {
              if (id === newSelectedId) {
                handle.classList.add('active');
                handle.classList.remove('overlapping');
              } else {
                handle.classList.add('overlapping');
                handle.classList.remove('active');
              }
            }
          });

          parent.postMessage({ 
            type: 'cycleElement', 
            direction: e.deltaY < 0 ? 'next' : 'prev',
            elements: elementIdsAtPoint,
            currentIndex: validCurrentIndex
          }, '*');
        }, { passive: false });

        handle.addEventListener('mousedown', (e) => {
          console.log('[preview] mousedown:', { elementId: el.id, edge, hasAspect });
          if (hasAspect) return;
          e.preventDefault();
          e.stopPropagation();

          // Clear all active/overlapping classes when starting to drag
          const allHandles = document.querySelectorAll('.handle');
          allHandles.forEach(h => {
            h.classList.remove('active', 'overlapping');
          });
          handle.classList.add('dragging');
          document.body.classList.add('is-dragging');

          const targetId = selectedElementId || el.id;

          const startX = e.clientX;
          const startY = e.clientY;

          console.log('[preview] posting dragStart:', { elementId: targetId, edge, startX, startY });
          parent.postMessage({
            type: 'dragStart',
            elementId: targetId,
            edge,
            startX,
            startY
          }, '*');

          const onMouseMove = (e) => {
            const deltaX = e.clientX - startX;
            const deltaY = e.clientY - startY;

            parent.postMessage({
              type: 'drag',
              elementId: targetId,
              edge,
              deltaX,
              deltaY
            }, '*');
          };

          const onMouseUp = (e) => {
            const deltaX = e.clientX - startX;
            const deltaY = e.clientY - startY;

            console.log('[preview] posting dragEnd:', { elementId: targetId, edge, deltaX, deltaY });
            parent.postMessage({
              type: 'dragEnd',
              elementId: targetId,
              edge,
              deltaX,
              deltaY
            }, '*');

            handle.classList.remove('dragging');
            document.body.classList.remove('is-dragging');
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
          };

          document.addEventListener('mousemove', onMouseMove);
          document.addEventListener('mouseup', onMouseUp);
        });

        el.appendChild(handle);
      });
    }
  </script>
</body>
</html>
