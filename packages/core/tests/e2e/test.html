<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script src="../../dist/lx.min.js"></script>
		<script src="../../dist/lx-auto.min.js"></script>
		<title>LX e2e test</title>
		<style>
		* {
			box-sizing: border-box;
		}
		</style>
	</head>
	<body data-lx-gap="25" data-lx-scale="0.8">
		<div id="e2e-fixture" lx lx-top="0" lx-left="0" lx-right="0" lx-bottom="0" style="z-index: 100;">
			<div id="main" lx lx-top="0" lx-left="0" lx-width="({scale}*1920)" lx-height="({scale}*1080)"></div>

			<div id="info" lx lx-top="0" lx-left="0" lx-height="200" lx-width="300"></div>

			<div id="qa" lx lx-top="previous.bottom+({gap})" lx-left="0" lx-width="200" lx-height="100"></div>

			<div id="logo" lx lx-top="previous.bottom+({gap})" lx-left="0" lx-width="200" lx-bottom="0"></div>

			<div id="sidebar" lx lx-left="0" lx-width="100" lx-top="0" lx-bottom="0"></div>
		</div>
	</body>
</html>
