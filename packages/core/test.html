<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script src="./dist/lx.min.js"></script>
		<script src="./dist/lx-auto.min.js"></script>
		<title>LX demo page</title>
		<style>
		div {
			background-color: rgba(255, 180, 0, 0.08);
			border: 1px dashed rgba(0, 0, 0, 0.25);
			display: grid;
			place-items: center;
			font-size: 4rem;
			font-family: sans-serif;
			box-sizing: border-box;
			overflow: hidden;
		}
		</style>
	</head>
	<body data-lx-gap="25" data-lx-scale="0.8">
		<div id="e2e-fixture" lx lx-top="0" lx-left="0" lx-right="0" lx-bottom="0" style="z-index: 100;">
			<div id="main" lx lx-top="0" lx-left="0" lx-width="({scale}*1920)" lx-height="({scale}*1080)"></div>

			<div id="info" lx lx-top="0" lx-left="0" lx-height="200" lx-width="300"></div>

			<div id="qa" lx lx-top="previous.bottom+({gap})" lx-left="0" lx-width="200" lx-height="100"></div>

			<div id="logo" lx lx-top="previous.bottom+({gap})" lx-left="0" lx-width="200" lx-bottom="0"></div>

			<div id="sidebar" lx lx-left="0" lx-width="100" lx-top="0" lx-bottom="0"></div>
		</div>

		<div id="app" lx lx-top="20" lx-left="20" lx-right="-20" lx-bottom="-20" data-lx-sidebarWidth="160">
    	<div id="header"
      	lx-left="({gap})"
      	lx-right="(-{gap})"
      	lx-top="({gap})"
      	lx-height="60"
    	>Header</div>

    	<div id="sidebar-demo"
      	lx-left="#header.left"
      	lx-width="({sidebarWidth})"
      	lx-top="previous.bottom+({gap})"
      	lx-bottom="(-{gap})"
    	>Sidebar</div>

    	<div id="stage"
      	lx-top="previous.top"
      	lx-bottom="next.top-({gap})"
      	lx-left="previous.right+({gap})"
      	lx-aspect="16:9"
    	>16:9 Stage (Aspect Ratio)</div>

    	<div id="footer"
     		lx-left="#sidebar-demo.right+({gap})"
     		lx-right="0"
     		lx-bottom="0"
     		lx-height="60"
    	>Footer</div>
  	</div>
	</body>
</html>
